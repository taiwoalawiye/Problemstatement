<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Statement Generator for Product Managers</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 30px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #ecf0f1;
        }
        #copyButton, #printButton {
            width: 48%;
            display: inline-block;
            margin-top: 20px;
        }
        #copyButton {
            background-color: #9b59b6;
            margin-right: 2%;
        }
        #copyButton:hover {
            background-color: #8e44ad;
        }
        #printButton {
            background-color: #2ecc71;
        }
        #printButton:hover {
            background-color: #27ae60;
        }
        #actionButtons {
            display: flex;
            justify-content: space-between;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #result, #result * {
                visibility: visible;
            }
            #result {
                position: absolute;
                left: 0;
                top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Problem Statement Generator for Product Managers</h1>
        <p>Fill in the fields below to generate a comprehensive problem statement:</p>

        <form id="problemStatementForm">
            <label for="user">Who is the user or stakeholder affected by this problem?</label>
            <input type="text" id="user" required>

            <label for="situation">What is the current situation or context?</label>
            <input type="text" id="situation" required>

            <label for="problem">What is the specific problem or pain point?</label>
            <input type="text" id="problem" required>

            <label for="impact">What is the impact or consequence of this problem?</label>
            <input type="text" id="impact" required>

            <label for="desiredOutcome">What is the desired outcome or goal?</label>
            <input type="text" id="desiredOutcome" required>

            <button type="submit">Generate Problem Statement</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('problemStatementForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('user').value;
            const situation = document.getElementById('situation').value;
            const problem = document.getElementById('problem').value;
            const impact = document.getElementById('impact').value;
            const desiredOutcome = document.getElementById('desiredOutcome').value;

            const problemStatementText = `Problem Statement:

For ${user}, the current situation is that ${situation}. The key problem they face is ${problem}. This is significant because it results in ${impact}. To address this, the desired outcome would be ${desiredOutcome}.`;

            const problemStatementHTML = `
                <h2>Problem Statement</h2>
                <p>For ${user}, the current situation is that ${situation}. The key problem they face is ${problem}. This is significant because it results in ${impact}. To address this, the desired outcome would be ${desiredOutcome}.</p>
            `;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = problemStatementHTML;

            // Add action buttons container
            const actionButtons = document.createElement('div');
            actionButtons.id = 'actionButtons';
            resultDiv.appendChild(actionButtons);

            // Add copy button
            const copyButton = document.createElement('button');
            copyButton.id = 'copyButton';
            copyButton.textContent = 'Copy to Clipboard';
            copyButton.onclick = () => {
                navigator.clipboard.writeText(problemStatementText).then(() => {
                    copyButton.textContent = 'Copied!';
                    setTimeout(() => {
                        copyButton.textContent = 'Copy to Clipboard';
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            };
            actionButtons.appendChild(copyButton);

            // Add print button
            const printButton = document.createElement('button');
            printButton.id = 'printButton';
            printButton.textContent = 'Print Problem Statement';
            printButton.onclick = () => window.print();
            actionButtons.appendChild(printButton);
        });
    </script>
</body>
</html>
